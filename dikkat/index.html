<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H4QYU - Alert</title>
<style>
  /* Reset */
  *{margin:0;padding:0;box-sizing:border-box;font-family:monospace;}
  html,body{width:100%;height:100%;overflow:hidden;background:#f5f5f5;color:#111;}

  body{display:flex;justify-content:center;align-items:center;flex-direction:column;}

  /* Avatar */
  #avatar{
    width:150px;
    height:150px;
    border-radius:50%;
    border:3px solid #00aaff;
    box-shadow:0 0 20px #00aaff;
    transition:0.3s;
    margin-bottom:20px;
  }
  #avatar:hover{transform:scale(1.1);box-shadow:0 0 35px #00aaff;}

  /* Name & Role */
  #name{font-size:48px;font-weight:bold;color:#00aaff;}
  #role{font-size:24px;color:#ffaa00;margin-bottom:15px;}

  /* Alert Message */
  #alertBox{
    background:#ffffff;
    border:2px solid #ffaa00;
    box-shadow:0 0 25px rgba(255,170,0,0.5);
    padding:25px 40px;
    border-radius:15px;
    text-align:center;
    max-width:400px;
    margin-top:20px;
  }
  #alertBox h1{color:#ff0000;font-size:28px;margin-bottom:15px;}
  #alertBox p{font-size:18px;margin-bottom:15px;color:#333;}

  /* Buttons */
  .btn{
    display:inline-block;
    padding:10px 20px;
    margin:5px;
    border:2px solid #00aaff;
    border-radius:8px;
    color:#00aaff;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 0 10px rgba(0,170,255,0.5);
  }
  .btn:hover{
    background:#00aaff;
    color:#fff;
    box-shadow:0 0 25px rgba(0,170,255,0.7);
  }
</style>
</head>
<body>

<!-- Avatar -->
<img id="avatar" src="../images/logo.png" alt="Avatar">

<!-- Name & Role -->
<div id="name">H4QYU</div>
<div id="role">Developer</div>

<!-- Alert Box -->
<div id="alertBox">
  <h1>⚠ تحذير ⚠</h1>
  <p>الميزة التي حاولت الوصول إليها غير مفعّلة بعد.</p>
  <p>لا يمكن الانتقال إلى هذه الواجهة الآن.</p>
  <a href="../index.html" class="btn">رجوع</a>
  <a href="dikkat2/index.html" class="btn">تجاهل</a>
</div>

<script>
  // أصوات بسيطة
  const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
  const hoverSound = new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3");

  document.querySelectorAll(".btn").forEach(el=>{
    el.addEventListener("mouseenter", ()=>{
      hoverSound.currentTime=0;
      hoverSound.play();
    });
    el.addEventListener("click", ()=>{
      clickSound.currentTime=0;
      clickSound.play();
    });
  });
</script>

</body>
</html>
